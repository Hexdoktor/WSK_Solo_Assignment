<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Restaurants Finland</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <h1 class="logo">Student Restaurants</h1>
        <nav class="nav">
          <button data-view="restaurantsView">Restaurants</button>
          <button data-view="favoritesView">Favorites</button>
          <button data-view="profileView">Profile</button>
          <button data-view="mapView">Map</button>
          <button id="logoutBtn">Logout</button>
        </nav>
      </div>
    </header>

    <!-- LOGIN / REGISTER -->
    <section id="loginView" class="view">
      <div class="auth-box">
        <h2>Welcome</h2>
        <!--LOGIN-->
        <input type="text" id="loginUsername" placeholder="Username" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button id="loginBtn">Login</button>
        <hr style="margin: 1.5rem 0; opacity: 0.2" />

        <!--REGISTER-->
        <input type="text" id="registerUsername" placeholder="Username" />
        <input type="password" id="registerPassword" placeholder="Password" />
        <button id="registerBtn" class="secondary">Register</button>
      </div>
    </section>

    <!-- RESTAURANT LIST -->
    <section id="restaurantsView" class="view">
      <div class="container">
        <h2>Restaurants</h2>

        <div class="filters">
          <select id="cityFilter">
            <option value="">All cities</option>
          </select>

          <select id="providerFilter">
            <option value="">All providers</option>
          </select>

          <input
            type="text"
            id="searchInput"
            placeholder="Search restaurants"
          />
        </div>

        <div id="restaurantList" class="grid"></div>
      </div>
    </section>

    <!-- RESTAURANT DETAIL -->
    <section id="restaurantDetailView" class="view">
      <div id="restaurantDetailContent" class="container">
        <button class="backBtn" data-view="restaurantsView">← Back</button>

        <div id="restaurantInfo"></div>

        <div class="tabs">
          <button data-menu="day" class="active">Today</button>
          <button data-menu="week">This Week</button>
        </div>

        <div id="menuContainer">
          <div id="menuDay"></div>
          <div id="menuWeek" style="display: none"></div>
        </div>
      </div>
    </section>

    <!-- FAVORITES -->
    <section id="favoritesView" class="view">
      <div class="container">
        <h2>Your Favorites</h2>
        <div id="favoritesList" class="grid"></div>
      </div>
    </section>

    <!-- PROFILE -->
    <section id="profileView" class="view">
      <div class="container profile">
        <h2>Your Profile</h2>

        <img
          id="profileImage"
          class="profile-img"
          src="../images/default_profile_picture.png"
          alt="Profile picture"
        />

        <input type="file" id="profileImageUpload" />

        <input type="text" id="profileName" placeholder="Your name" />
        <input type="text" id="profileCity" placeholder="City" />

        <button id="saveProfileBtn">Save Changes</button>
      </div>
    </section>

    <!-- MAP VIEW -->
    <section id="mapView" class="view">
      <div class="container">
        <h2>Restaurants on Map</h2>
        <div id="map" class="map"></div>
      </div>
    </section>

    <footer class="footer">
      <p>© 2026 Student Restaurants Finland</p>
    </footer>

    <script type="module" src="../js/core/main.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </body>
</html>
